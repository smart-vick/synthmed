app = "synthmed"
primary_region = "yyz"  # Toronto — closest to Canada

[build]

[env]
  NODE_ENV = "production"
  PORT = "3000"
  DB_PATH = "/data/synthmed.db"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "synthmed_data"
  destination = "/data"
