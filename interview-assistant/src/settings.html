<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>InterviewAI — Setup</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, 'Segoe UI', sans-serif;
  background: #0d0d1a;
  color: #e0e0e0;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.card {
  width: 400px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(0,255,136,0.15);
  border-radius: 16px;
  padding: 32px;
}

.logo {
  text-align: center;
  margin-bottom: 24px;
}

.logo h1 {
  font-size: 22px;
  font-weight: 700;
  color: #00ff88;
  letter-spacing: 2px;
  text-shadow: 0 0 20px rgba(0,255,136,0.4);
}

.logo p {
  font-size: 12px;
  color: #555;
  margin-top: 4px;
  letter-spacing: 0.5px;
}

.field {
  margin-bottom: 16px;
}

label {
  display: block;
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #555;
  margin-bottom: 6px;
}

input, select {
  width: 100%;
  padding: 10px 14px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  color: #e0e0e0;
  font-size: 13px;
  font-family: 'SF Mono', monospace;
  outline: none;
  transition: border-color 0.2s;
}

input:focus, select:focus {
  border-color: rgba(0,255,136,0.4);
  box-shadow: 0 0 0 2px rgba(0,255,136,0.08);
}

select option { background: #0d0d1a; }

.hint {
  font-size: 11px;
  color: #444;
  margin-top: 5px;
  line-height: 1.5;
}

.hint a {
  color: #00ff88;
  cursor: pointer;
  text-decoration: none;
}

.hint a:hover { text-decoration: underline; }

.save-btn {
  width: 100%;
  padding: 12px;
  background: rgba(0,255,136,0.1);
  border: 1px solid rgba(0,255,136,0.35);
  border-radius: 8px;
  color: #00ff88;
  font-size: 14px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 8px;
}

.save-btn:hover {
  background: rgba(0,255,136,0.18);
  box-shadow: 0 0 20px rgba(0,255,136,0.15);
}

.error {
  background: rgba(255,68,102,0.1);
  border: 1px solid rgba(255,68,102,0.3);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 12px;
  color: #ff6688;
  margin-top: 12px;
  display: none;
}
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <h1>InterviewAI</h1>
    <p>Real-time AI assistant for phone interviews</p>
  </div>

  <div class="field">
    <label>Gemini API Key</label>
    <input type="password" id="api-key" placeholder="AIza..." autocomplete="off" spellcheck="false">
    <p class="hint">
      Get your free key at <a id="link-console">aistudio.google.com/apikey</a> — free tier, no credit card
    </p>
  </div>

  <div class="field">
    <label>Default Interview Mode</label>
    <select id="default-mode">
      <option value="general">General — all-purpose</option>
      <option value="technical">Technical — software/engineering</option>
      <option value="behavioral">Behavioral — STAR method</option>
    </select>
  </div>

  <button class="save-btn" id="save-btn">Start →</button>
  <div class="error" id="error-msg"></div>
</div>

<script>
const $ = id => document.getElementById(id);

$('link-console').addEventListener('click', () => {
  window.ai.openLink('https://aistudio.google.com/apikey');
});

$('save-btn').addEventListener('click', async () => {
  const key = $('api-key').value.trim();
  const mode = $('default-mode').value;

  if (!key.startsWith('AIza')) {
    $('error-msg').style.display = 'block';
    $('error-msg').textContent = 'Invalid API key — should start with AIza';
    return;
  }

  $('error-msg').style.display = 'none';
  $('save-btn').textContent = 'Connecting...';
  $('save-btn').disabled = true;

  await window.ai.saveConfig({ GEMINI_API_KEY: key, defaultMode: mode });
});

$('api-key').addEventListener('keydown', e => {
  if (e.key === 'Enter') $('save-btn').click();
});

// Load existing config
(async () => {
  const cfg = await window.ai.getConfig();
  if (cfg.GEMINI_API_KEY) $('api-key').value = cfg.GEMINI_API_KEY;
  if (cfg.defaultMode) $('default-mode').value = cfg.defaultMode;
})();
</script>
</body>
</html>
